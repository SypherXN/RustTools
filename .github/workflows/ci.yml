name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      - run: npm run build --workspace=@rusttools/shared
      - run: npm run build --workspace=@rusttools/db
      - run: npm run build --workspace=@rusttools/rustplus-client
      - run: npm run build --workspace=@rusttools/api
      - run: npm run build --workspace=@rusttools/web
      - run: npm run build --workspace=@rusttools/discord-bot
