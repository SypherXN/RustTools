name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install
      - run: npm run build --workspace=@rusttools/shared
      - name: Validate frontend API URL
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "Set repository variable VITE_API_URL to your API origin, e.g. https://rusttools.example.com" >&2
            exit 1
          fi
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - run: npm run build --workspace=@rusttools/web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BASE_PATH: /RustTools/
          VITE_LIVE_CAMERAS: ${{ vars.VITE_LIVE_CAMERAS }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
