x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PROCGEN_PARSE_HEAP_MB: ${PROCGEN_PARSE_HEAP_MB:-4096}
    volumes:
      - rusttools-data:/app/data
    expose:
      - "3000"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  discord-bot:
    build:
      context: .
      dockerfile: apps/discord-bot/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      API_PUBLIC_URL: http://api:3000
    logging: *default-logging
    healthcheck:
      # PID 1 is the bot node process; no procps required (works on ARM bookworm-slim).
      # Detects crashed entrypoint; hung event loops may still show healthy — see bot-http-health (deferred).
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q 'discord-bot/dist/index.js' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 45s
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy

volumes:
  rusttools-data:
  caddy-data:
  caddy-config:
